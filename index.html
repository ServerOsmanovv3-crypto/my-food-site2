<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Local Grocer Direct</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Local Grocer Direct</h1>
        <p>Ваш магазин свежих продуктов онлайн!</p>
    </header>

    <section class="products">
        <div class="product">
            <img src="images/apple.jpg" alt="Яблоко" width="150">
            <h2>Яблоко</h2>
            <p>Свежие и сочные яблоки.</p>
            <button>Купить</button>
        </div>
        <div class="product">
            <img src="images/banana.jpg" alt="Банан" width="150">
            <h2>Банан</h2>
            <p>Спелые и сладкие бананы.</p>
            <button>Купить</button>
        </div>
    </section>
</body>
</html>
